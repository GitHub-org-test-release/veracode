veracode_static_scan:
  push:
    trigger: true
    branches_to_run:
      - master
    branches_to_exclude: null
    analysis_on_platform: false
    create_code_scanning_alert: false
    issues: false
  pull_request:
    trigger: false
    action:
      - opened
      - synchronize
    target_branch:
      - default_branch
  analysis_on_platform: false
  break_build_policy_findings: true
  break_build_invalid_policy: !<tag:yaml.org,2002:js/undefined> ''
  break_build_on_error: false
  error_message: >-
    Veracode static scan faced a problem. Please contact your Veracode
    administrator for more information.
  policy: !<tag:yaml.org,2002:js/undefined> ''
  create_code_scanning_alert: false
  create_issue: false
  issues:
    trigger: false
    commands:
      - Veracode Static Scan
veracode_sca_scan:
  push:
    trigger: false
    branches_to_run:
      - master
    branches_to_exclude: null
  pull_request:
    trigger: false
    action:
      - opened
      - synchronize
    target_branch:
      - default_branch
  break_build_on_error: true
  error_message: >-
    Veracode SCA scan faced a problem. Please contact your Veracode
    administrator for more information.
  issues:
    trigger: false
    commands:
      - Veracode SCA Scan
